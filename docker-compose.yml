services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html:cached
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:SomeRandomKeyHere
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    depends_on: []
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
